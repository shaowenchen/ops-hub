---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-operator
  namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: vm-operator
  name: vm-operator
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: vm-operator
  template:
    metadata:
      labels:
        control-plane: vm-operator
    spec:
      containers:
        - args:
            - --enable-leader-election
          command:
            - manager
          env:
            - name: WATCH_NAMESPACE
              value: ""
            - name: VM_CONFIG_RELOADER_IMAGE
              value: quay.io/prometheus-operator/prometheus-config-reloader:v0.73.1
          image: victoriametrics/operator:v0.73.1
          name: manager
          resources:
            limits:
              cpu: 120m
              memory: 520Mi
            requests:
              cpu: 80m
              memory: 120Mi
      serviceAccountName: vm-operator
      terminationGracePeriodSeconds: 10
