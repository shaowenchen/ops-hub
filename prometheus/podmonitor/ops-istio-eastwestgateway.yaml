apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    ops: "true"
  name: ops-istio-eastwestgateway
  namespace: monitoring
spec:
  podMetricsEndpoints:
  - interval: 30s
    path: /stats/prometheus
    port: http-envoy-prom
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      istio: eastwestgateway